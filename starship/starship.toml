# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$character"""

palette = "rose_pine"

# Palette values kept in sync with fish/themes/Ros√© Pine.theme (main variant)
[palettes.rose_pine]
base = "#191724"
subtle = "#908caa"
text = "#e0def4"
love = "#eb6f92"
gold = "#f6c177"
rose = "#ebbcba"
pine = "#31748f"
foam = "#9ccfd8"
iris = "#c4a7e7"

[directory]
style = "foam"

[character]
success_symbol = "[‚ùØ](iris)"
error_symbol = "[‚ùØ](love)"
vimcmd_symbol = "[‚ùÆ](pine)"

[git_branch]
format = "[$branch]($style)"
style = "subtle"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](rose) ($ahead_behind$stashed)]($style)"
style = "foam"
conflicted = "‚Äã"
untracked = "‚Äã"
modified = "‚Äã"
staged = "‚Äã"
renamed = "‚Äã"
deleted = "‚Äã"
stashed = "‚â°"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "subtle"

[cmd_duration]
format = "[$duration]($style) "
style = "gold"

[python]
format = "[$virtualenv]($style) "
style = "subtle"
detect_extensions = []
detect_files = []