# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

format = """
${env_var.ZMX_SESSION}\
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$character"""

palette = "everforest"

# Palette values kept in sync with fish/themes/Everforest Dark Hard.theme
[palettes.everforest]
bg = "#272e33"
fg = "#d3c6aa"
grey = "#859289"
red = "#e67e80"
orange = "#e69875"
yellow = "#dbbc7f"
green = "#a7c080"
aqua = "#83c092"
blue = "#7fbbb3"
purple = "#d699b6"

[directory]
style = "aqua"

[character]
success_symbol = "[‚ùØ](purple)"
error_symbol = "[‚ùØ](red)"
vimcmd_symbol = "[‚ùÆ](blue)"

[git_branch]
format = "[$branch]($style)"
style = "grey"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](orange) ($ahead_behind$stashed)]($style)"
style = "aqua"
conflicted = "‚Äã"
untracked = "‚Äã"
modified = "‚Äã"
staged = "‚Äã"
renamed = "‚Äã"
deleted = "‚Äã"
stashed = "‚â°"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "grey"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[python]
format = "[$virtualenv]($style) "
style = "grey"
detect_extensions = []
detect_files = []

[env_var.ZMX_SESSION]
format = "[$env_value]($style) "
style = "purple"
description = "zmx session name"